# ============================================================
# render.yaml — Render Deployment Configuration
# PRPCEM NoteBridge Platform
# ============================================================
# This file defines BOTH services in one place.
# Push to GitHub then connect on render.com → "New Blueprint"

services:

  # ── 1. BACKEND (Web Service) ────────────────────────────────
  - type: web
    name: notebridge-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # ⚠️ Set these SECRETLY in Render dashboard (do NOT put real values here)
      - key: MONGO_URI
        sync: false          # Render will prompt you to fill this in
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CLIENT_URL
        value: https://notebridge-frontend.onrender.com
      - key: MAX_FILE_SIZE_MB
        value: 50

  # ── 2. FRONTEND (Static Site) ───────────────────────────────
  - type: web
    name: notebridge-frontend
    runtime: static
    rootDir: frontend
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /login.html
