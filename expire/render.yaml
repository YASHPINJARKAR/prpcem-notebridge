# ============================================================
# render.yaml — Render Deployment Configuration
# PRPCEM NoteBridge Platform (Full-Stack React + Node.js)
# ============================================================
# Push to GitHub → connect on render.com → "New Blueprint"
# Fill in all `sync: false` vars in the Render dashboard.

services:

  # ── 1. BACKEND (Web Service: Node.js + Express) ─────────────
  - type: web
    name: notebridge-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # ⚠️ Set these SECRETLY in Render dashboard
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      # Cloudinary — set in dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://notebridge-frontend.onrender.com
      - key: MAX_FILE_SIZE_MB
        value: 50

  # ── 2. FRONTEND (Static Site: React + Vite build) ───────────
  - type: web
    name: notebridge-frontend
    runtime: static
    rootDir: frontend-react
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://notebridge-backend.onrender.com/api
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      # SPA fallback: serve index.html for all unknown paths (React Router)
      - type: rewrite
        source: /*
        destination: /index.html
